<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrapper">
    <h1 class="game-title">TETRIS</h1>
    <div class="game-container">
      <canvas id="board" width="300" height="600"></canvas>

      <aside class="panel">
        <div class="panel-section">
          <label class="theme-switch" title="Cambiar modo claro/oscuro">
            <span class="theme-icon">🌙</span>
            <input type="checkbox" id="theme-toggle" />
            <span class="switch-track"><span class="switch-thumb"></span></span>
            <span class="theme-icon">☀️</span>
          </label>
        </div>

        <div class="panel-section">
          <span class="label">SCORE</span>
          <span class="value" id="score">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LINES</span>
          <span class="value" id="lines">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LEVEL</span>
          <span class="value" id="level">1</span>
        </div>

        <div class="panel-section">
          <span class="label">NEXT</span>
          <canvas id="next-canvas" width="120" height="120"></canvas>
        </div>

        <div class="panel-section controls">
          <span class="label">CONTROLS</span>
          <ul>
            <li><kbd>←</kbd><kbd>→</kbd> mover</li>
            <li><kbd>↑</kbd> rotar</li>
            <li><kbd>↓</kbd> bajar</li>
            <li><kbd>Space</kbd> caída</li>
            <li><kbd>P</kbd> pausa</li>
          </ul>
        </div>
      </aside>
    </div>

    <!-- High-scores section shown on start screen -->
    <section id="hs-start-section" class="hs-start hidden">
      <h2 class="hs-title">RECORDS</h2>
      <div class="hs-content"></div>
      <button id="clear-hs-btn" class="clear-hs-btn">Borrar records</button>
    </section>

    <div id="overlay" class="overlay hidden">
      <div class="overlay-box">
        <p id="overlay-title">GAME OVER</p>
        <p id="overlay-score"></p>

        <!-- Name entry — shown only when score qualifies -->
        <div id="name-entry-section" class="hidden">
          <p class="name-entry-label">¡Nuevo record! Ingresa tu nombre:</p>
          <div class="name-entry-row">
            <input type="text" id="player-name" maxlength="16" placeholder="Tu nombre" autocomplete="off" />
            <button id="save-score-btn">Guardar</button>
          </div>
        </div>

        <!-- High-scores table inside overlay -->
        <div id="hs-overlay-section" class="hidden hs-overlay-content"></div>

        <button id="restart-btn">Reiniciar</button>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
